<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Sign Up - Fashion Store</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <link rel="stylesheet" href="../assets/css/style.css">
    <link rel="stylesheet" href="../assets/css/login.css">
</head>
<body>
    <div class="auth-wrapper">
        <div class="auth-image" style="background-image: url('https://images.unsplash.com/photo-1483985988355-763728e1935b?q=80&w=2070&auto=format&fit=crop');">
            <div class="auth-image-overlay">
                <h2>Join the Club</h2>
                <p>Create an account to track your orders, save items to your wishlist, and check out faster.</p>
            </div>
        </div>
        
        <div class="auth-form-container">
            <a href="home.html" class="auth-brand">Fashion Store</a>
            
            <div class="auth-header">
                <h1>Create Account</h1>
                <p>Please fill in the information below.</p>
            </div>
            
            <form id="registerForm">
                <div class="floating-group">
                    <input type="text" id="name" class="floating-input" required placeholder=" ">
                    <label class="floating-label">Full Name</label>
                </div>

                <div class="floating-group">
                    <input type="email" id="email" class="floating-input" required placeholder=" ">
                    <label class="floating-label">Email Address</label>
                </div>

                <div class="floating-group">
                    <input type="text" id="phone" class="floating-input" required placeholder=" ">
                    <label class="floating-label">Phone Number</label>
                </div>

                <div class="floating-group">
                    <input type="text" id="address" class="floating-input" required placeholder=" ">
                    <label class="floating-label">Address</label>
                </div>
                
                <div class="floating-group">
                    <input type="password" id="password" class="floating-input" required placeholder=" ">
                    <label class="floating-label">Password</label>
                </div>
                
                <button type="submit" class="btn-auth-submit" id="submitBtn">Sign Up</button>
            </form>
            
            <div class="auth-footer">
                Already have an account? <a href="login.html">Sign in</a>
            </div>
        </div>
    </div>

    <!-- Ensure toast notifications can be displayed -->
    <script src="../assets/js/main.js"></script>
    <script src="../assets/js/register.js"></script>
</body>
</html>
