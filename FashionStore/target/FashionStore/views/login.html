<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Login - Fashion Store</title>
    <!-- Include FontAwesome for icons -->
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <link rel="stylesheet" href="../assets/css/style.css">
    <link rel="stylesheet" href="../assets/css/login.css">
</head>
<body>
    <div class="auth-wrapper">
        <div class="auth-image">
            <div class="auth-image-overlay">
                <h2>The New Collection</h2>
                <p>Discover pieces designed to elevate your everyday wardrobe.</p>
            </div>
        </div>
        
        <div class="auth-form-container">
            <a href="home.html" class="auth-brand">Fashion Store</a>
            
            <div class="auth-header">
                <h1>Welcome Back</h1>
                <p>Please enter your details to sign in.</p>
            </div>
            
            <form id="loginForm">
                <div class="floating-group">
                    <input type="email" id="email" class="floating-input" required placeholder=" ">
                    <label class="floating-label">Email Address</label>
                </div>
                
                <div class="floating-group">
                    <input type="password" id="password" class="floating-input" required placeholder=" ">
                    <label class="floating-label">Password</label>
                </div>
                
                <button type="submit" class="btn-auth-submit" id="submitBtn">Sign In</button>
            </form>
            
            <div class="auth-footer">
                Don't have an account? <a href="register.html">Sign up</a>
            </div>
        </div>
    </div>

    <!-- Ensure toast notifications can be displayed -->
    <script src="../assets/js/main.js"></script>
    <script src="../assets/js/login.js"></script>
</body>
</html>
